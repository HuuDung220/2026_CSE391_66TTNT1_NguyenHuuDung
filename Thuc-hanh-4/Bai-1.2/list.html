<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý điểm sinh viên</title>

    <style>
      body {
        font-family: Arial;
      }

      table {
        border-collapse: collapse;
        width: 700px;
        margin-top: 10px;
      }

      th,
      td {
        border: 1px solid black;
        padding: 8px;
        text-align: center;
      }

      th {
        cursor: pointer;
      }

      .weak {
        background-color: yellow;
      }

      .controls {
        margin: 10px 0;
      }
    </style>
  </head>

  <body>
    <h2>Bảng Điểm Sinh Viên</h2>

    <div class="controls">
      <input type="text" id="name" placeholder="Họ tên" />

      <input type="number" id="score" placeholder="Điểm (0-10)" />

      <button id="addBtn">Thêm</button>

      <br /><br />

      <input type="text" id="search" placeholder="Tìm kiếm tên" />

      <select id="filterRank">
        <option value="all">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="sortScore">Điểm ▲▼</th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>

    <p id="stats"></p>

    <script src="list.js"></script>
  </body>
</html>
